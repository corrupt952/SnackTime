name: Release

concurrency:
  group: "release"
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: corepack enable
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: "pnpm"
      - name: Export current version
        run: echo "SNACK_TIME_VERSION=v$(jq -r .version package.json)" > $GITHUB_ENV
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: >-
          cd .output/chrome-mv3 && \
            zip -r ../../snack_time.zip ./*
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "${{ env.SNACK_TIME_VERSION }}"
          snack_time.zip#"snack-time-${{ env.SNACK_TIME_VERSION }}.zip"
          --generate-notes
          --title "Release ${{ env.SNACK_TIME_VERSION }}"
