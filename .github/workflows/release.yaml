name: Release

concurrency:
  group: "release"
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"
      - name: Export current version
        run: echo "SNACK_TIME_VERSION=v$(jq -r .version package.json)" > $GITHUB_ENV
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: >-
          cd .output/chrome-mv3 && \
            zip -r ../../snack_time.zip ./*
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "${{ env.SNACK_TIME_VERSION }}"
          snack_time.zip#"snack-time-${{ env.SNACK_TIME_VERSION }}.zip"
          --generate-notes
          --title "Release ${{ env.SNACK_TIME_VERSION }}"
